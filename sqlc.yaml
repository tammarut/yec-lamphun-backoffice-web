version: "2"
plugins:
    - name: ts
      wasm:
          url: "https://downloads.sqlc.dev/plugin/sqlc-gen-typescript_0.1.3.wasm"
          sha256: "287df8f6cc06377d67ad5ba02c9e0f00c585509881434d15ea8bd9fc751a9368"
sql:
    - schema: "src/modules/system-settings/repository/sql/schema.sql"
      queries: "src/modules/system-settings/repository/sql/queries.sql"
      engine: "postgresql"
      codegen:
          - out: "src/modules/system-settings/repository/sql/sqlc-generated"
            plugin: ts
            options:
                runtime: "node"
                driver: "postgres"
    - schema: "src/modules/business-categories/repository/sql/schema.sql"
      queries: "src/modules/business-categories/repository/sql/queries.sql"
      engine: "postgresql"
      codegen:
          - out: "src/modules/business-categories/repository/sql/sqlc-generated"
            plugin: ts
            options:
                runtime: "node"
                driver: "postgres"
    # The members module owns members, positions, member_documents, and
    # member_business (see docs/adr/0005-merge-member-business-and-member-document-into-members-module.md).
    # business_categories is referenced only so its FK resolves during parsing.
    - schema:
          - "src/modules/business-categories/repository/sql/schema.sql"
          - "src/modules/members/repository/sql/schema.sql"
          - "src/modules/members/repository/member-document/sql/schema.sql"
          - "src/modules/members/repository/member-business/sql/schema.sql"
      queries: "src/modules/members/repository/sql/queries.sql"
      engine: "postgresql"
      codegen:
          - out: "src/modules/members/repository/sql/sqlc-generated"
            plugin: ts
            options:
                runtime: "node"
                driver: "postgres"
