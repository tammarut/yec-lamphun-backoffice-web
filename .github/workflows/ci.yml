name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        # Pinned to v2.1.3: v2.2.0 bumped the action runtime to node24, which
        # `act` (local runner) does not yet support. Pinning keeps CI and local
        # `act` runs in sync. Re-evaluate when act adds node24 support.
        uses: oven-sh/setup-bun@v2.1.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Build
        env:
          SKIP_ENV_VALIDATION: "true"
        run: bun run build
